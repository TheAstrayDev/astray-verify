name: Bug report
description: Report a reproducible problem with Astray Verify.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping make MCP contract checks dependable. Please remove secrets and tokens from logs."
  - type: input
    id: version
    attributes:
      label: Astray Verify version
      placeholder: astray-verify --version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and MCP server
      description: Include the command you ran and the server runtime/version if known.
      placeholder: astray-verify test --name example
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
