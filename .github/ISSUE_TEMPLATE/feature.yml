name: Feature request
description: Suggest a focused improvement to MCP contract verification.
title: "feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Describe the workflow first. Concrete MCP examples help us evaluate the idea."
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: When my MCP server changes..., I need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
