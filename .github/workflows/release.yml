name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: astray-verify-linux-x86_64
          - os: macos-13
            asset: astray-verify-macos-x86_64
          - os: macos-14
            asset: astray-verify-macos-aarch64
          - os: windows-latest
            asset: astray-verify-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked
      - run: cargo build --release --locked
      - name: Prepare release asset (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/astray-verify ${{ matrix.asset }}
      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/astray-verify.exe ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*/*
